  <style>

    body{

    textarea{

<body>
  <div class="container">
    <h1>MCFunction Formatter</h1>
    <div class="subtitle">Format Minecraft commands into clean multi-line mcfunction syntax</div>

    <textarea id="inp" placeholder="Paste your command here..."></textarea>
<div class="container">
  <h1>MCFunction Multi-Tool</h1>
  <div class="subtitle">Formatter • Validator • Minifier • Splitter</div>

    <div class="controls">
      <button class="primary" onclick="go()">Format</button>
      <button onclick="clearAll()">Clear</button>
      <button onclick="loadExample()">Example</button>
      <button onclick="downloadFile()">Download</button>
      <label class="checkbox">
        <input type="checkbox" id="trail" checked> Trailing \\
      </label>
    </div>
  <textarea id="inp" placeholder="Paste command..."></textarea>

    <div class="topbar">
      <span>Output</span>
      <button onclick="copy()" id="copybtn">Copy</button>
    </div>

    <div id="warn" style="color:#f87171;font-size:12px;margin-bottom:6px;"></div>
    <pre><code id="out" class="language-json"></code></pre>
  <div class="tabs">
    <div class="tab active" data-mode="format">Format</div>
    <div class="tab" data-mode="minify">Minify</div>
    <div class="tab" data-mode="split">Split</div>
    <div class="tab" data-mode="validate">Validate</div>
  </div>

    <div class="footer">Built for Minecraft datapack creators</div>
  <div class="controls">
    <button class="primary" onclick="run()">Run</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="copy()">Copy</button>
  </div>

  <div id="warn" style="color:#f87171;font-size:12px;margin-bottom:6px"></div>
  <pre id="out"></pre>
</div>

<script>
function normalize(raw){
  return raw.replace(/\n/g,' ').replace(/\s+/g,' ').trim();
}
let mode = 'format';
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    mode=t.dataset.mode;
  }
});

function isValidNBT(str){
function normalize(str){return str.replace(/\s+/g,' ').trim();}

function validate(str){
  let stack=[];
  for(let c of str){
    if(c==='{'||c==='[') stack.push(c);
    if(c==='}') if(stack.pop()!=='{') return false;
    if(c===']') if(stack.pop()!=='[') return false;
    if('{['.includes(c)) stack.push(c);
    if('}]'.includes(c)){
      let last=stack.pop();
      if((c=='}'&&last!='{')||(c==']'&&last!='[')) return false;
    }
  }
  return stack.length===0;
}

function format(input){
  let depth = 0;
  let lines = [];
  let cur = '';
  let inString = false;

  for (let i = 0; i < input.length; i++) {
    let c = input[i];

    if (c === '"' && input[i - 1] !== '\\') {
      inString = !inString;
      cur += c;
      continue;
    }

    if (!inString) {
      if (c === '{' || c === '[') {
        if (cur.trim()) lines.push('  '.repeat(depth) + cur.trim());
        lines.push('  '.repeat(depth) + c);
        depth++;
        cur = '';
        continue;
      }

      if (c === '}' || c === ']') {
        if (cur.trim()) lines.push('  '.repeat(depth) + cur.trim());
        depth--;
        lines.push('  '.repeat(depth) + c);
        cur = '';
        continue;
      }
  let d=0,res=[],cur='',str=false;
  for(let i=0;i<input.length;i++){
    let c=input[i];
    if(c==='"'&&input[i-1]!=='\\'){str=!str}
    if(!str){
      if('{['.includes(c)){res.push('  '.repeat(d)+cur.trim());res.push('  '.repeat(d)+c);d++;cur='';continue}
      if('}]'.includes(c)){res.push('  '.repeat(d)+cur.trim());d--;res.push('  '.repeat(d)+c);cur='';continue}
      if(c===','){cur+=',';res.push('  '.repeat(d)+cur.trim());cur='';continue}
    }
    cur+=c;
  }
  if(cur.trim())res.push('  '.repeat(d)+cur.trim());
  return res;
}

      if (c === ',') {
        cur += ',';
        lines.push('  '.repeat(depth) + cur.trim());
        cur = '';
        continue;
      }
    }
function minify(str){return normalize(str)}

    cur += c;
  }
function splitCmd(str){
  return str.split(' ').map((w,i)=>i===0?w:w).join('\n');
}

  if (cur.trim()) lines.push('  '.repeat(depth) + cur.trim());
  return lines;
function render(lines){
  let out='';
  lines.forEach((l,i)=>{
    out+=`<div class="line"><span class="num">${i+1}</span><span class="code">${l}</span></div>`;
  });
  document.getElementById('out').innerHTML=out;
}

function go(){
function run(){
  let input=document.getElementById('inp').value;
  if(!input.trim()) return;
  let warn=document.getElementById('warn');

  let warn = document.getElementById('warn');
  if(!isValidNBT(input)){
    warn.textContent = '⚠ Invalid NBT structure detected';
  } else {
    warn.textContent = '';
  if(mode==='validate'){
    warn.textContent = validate(input) ? '✔ Valid structure' : '⚠ Invalid structure';
    document.getElementById('out').innerHTML='';
    return;
  }

  let lines=format(normalize(input));
  let trail=document.getElementById('trail').checked;

  let out=lines.map((l,i)=>
    trail && i < lines.length-1 ? l+'\\' : l
  ).join('\n');

  let outEl=document.getElementById('out');
  outEl.textContent=out;
  if(!validate(input)) warn.textContent='⚠ Invalid structure'; else warn.textContent='';

  Prism.highlightAll();
  if(mode==='format') render(format(normalize(input)));
  if(mode==='minify') render([minify(input)]);
  if(mode==='split') render(splitCmd(input).split('\n'));
}

function copy(){
  let t=document.getElementById('out').textContent;
  if(!t) return;

  navigator.clipboard.writeText(t);

  let b=document.getElementById('copybtn');
  b.textContent='✔ Copied';
  b.style.background='#22c55e';

  setTimeout(()=>{
    b.textContent='Copy';
    b.style.background='';
  },1500);
  let text=[...document.querySelectorAll('.code')].map(e=>e.textContent).join('\n');
  navigator.clipboard.writeText(text);
}

function clearAll(){
  document.getElementById('inp').value='';
  document.getElementById('out').textContent='';
  document.getElementById('out').innerHTML='';
  document.getElementById('warn').textContent='';
}

function loadExample(){
  const ex='/data merge entity @s {abilities:{mayfly:1b,flying:1b},CustomName:"{\\"text\\":\\"Test\\"}"}';
  document.getElementById('inp').value=ex;
  go();
}

function downloadFile(){
  const content = document.getElementById('out').textContent;
  if(!content) return;

  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'formatted.mcfunction';
  a.click();

  URL.revokeObjectURL(url);
}

window.addEventListener('DOMContentLoaded', () => {
  const trailBox = document.getElementById('trail');

  trailBox.checked = localStorage.getItem('trail') === 'true';

  trailBox.addEventListener('change', () => {
    localStorage.setItem('trail', trailBox.checked);
  });

  document.getElementById('inp').addEventListener('paste', () =>
    setTimeout(go, 50)
  );

  document.getElementById('inp').addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') go();
  });
});
</script>
