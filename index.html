<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command → Function MCFormatter</title>

  <style>
    :root {
      --bg:#0f172a;
      --card:#1e293b;
      --accent:#3b82f6;
      --accent-hover:#2563eb;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --border:#334155;
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: var(--card);
      border-radius: 14px;
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 15px;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: #0f172a;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      resize: none;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    button {
      background: #334155;
      color: var(--text);
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.15s;
    }

    button.primary {
      background: var(--accent);
    }

    button:hover {
      background: var(--accent-hover);
    }

    pre {
      background: #0f172a;
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 10px;
      overflow: auto;
      max-height: 350px;
      white-space: pre;
    }

    .line {
      font-family: monospace;
      font-size: 14px;
      white-space: pre;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Command → Function MCFormatter</h1>
  <div class="subtitle">Convert long commands into clean multiline .mcfunction format</div>

  <textarea id="inp" placeholder="Paste your command here..."></textarea>

  <div class="controls">
    <button class="primary" onclick="run()">Format</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="copy()">Copy</button>
    <button onclick="downloadFile()">Download</button>
  </div>

  <pre id="out"></pre>
</div>

<script>
function format(input){
  let d = 0, res = [], cur = "", str = false;

  for (let i = 0; i < input.length; i++) {
    let c = input[i];

    if (c === '"' && input[i - 1] !== "\\") str = !str;

    if (!str) {
      if ("{[".includes(c)) {
        if (cur.trim()) res.push("  ".repeat(d) + cur.trim() + " \\");
        res.push("  ".repeat(d) + c + " \\");
        d++;
        cur = "";
        continue;
      }
      if ("}]".includes(c)) {
        if (cur.trim()) res.push("  ".repeat(d) + cur.trim() + " \\");
        d--;
        res.push("  ".repeat(d) + c + " \\");
        cur = "";
        continue;
      }
      if (c === ",") {
        cur += ",";
        res.push("  ".repeat(d) + cur.trim() + " \\");
        cur = "";
        continue;
      }
    }

    cur += c;
  }

  if (cur.trim()) res.push("  ".repeat(d) + cur.trim());

  // Remove trailing slash from final line
  if (res.length > 0 && res[res.length - 1].endsWith("\\")) {
    res[res.length - 1] = res[res.length - 1].slice(0, -2);
  }

  return res;
}

function render(lines){
  let out = "";
  lines.forEach(l => {
    let display = l.replace(/\\/g, "\\\\"); // show \\ but copy/download = \
    out += '<div class="line">' + display + '</div>';
  });
  document.getElementById("out").innerHTML = out;
}

function run(){
  let input = document.getElementById("inp").value;
  render(format(input));
}

function copy(){
  let text = [...document.querySelectorAll(".line")]
    .map(e => e.textContent.replace(/\\\\/g, "\\")) // \\ → \
    .join("\n");

  navigator.clipboard.writeText(text);
}

function downloadFile(){
  let text = [...document.querySelectorAll(".line")]
    .map(e => e.textContent.replace(/\\\\/g, "\\")) // \\ → \
    .join("\n");

  let blob = new Blob([text], {type:"text/plain"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "output.mcfunction";
  a.click();
}

function clearAll(){
  document.getElementById("inp").value="";
  document.getElementById("out").innerHTML="";
}
</script>

</body>
</html>
