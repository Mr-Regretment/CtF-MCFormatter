<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCFunction Multi-Tool</title>

  <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>

  <style>
    :root {
      --bg:#0f172a; --card:#111827; --accent:#3b82f6;
      --text:#e5e7eb; --muted:#9ca3af; --border:#1f2933;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,system-ui,sans-serif;
      background:radial-gradient(circle at top,#1e293b,#020617);
      color:var(--text);
      display:flex;justify-content:center;align-items:center;
      min-height:100vh;padding:2rem;
    }
    .container{
      width:100%;max-width:900px;background:var(--card);
      border-radius:16px;padding:2rem;border:1px solid var(--border);
    }
    h1{text-align:center;margin-bottom:6px}
    .subtitle{text-align:center;color:var(--muted);margin-bottom:1rem}

    textarea{
      width:100%;height:140px;background:#020617;color:white;
      border:1px solid var(--border);border-radius:10px;padding:10px;
      font-family:monospace;
    }

    .tabs{display:flex;gap:8px;margin:10px 0}
    .tab{padding:6px 10px;border-radius:6px;background:#1f2937;cursor:pointer}
    .tab.active{background:var(--accent)}

    .controls{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}

    button{background:#1f2937;color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
    button.primary{background:var(--accent)}

    #warn{color:#f87171;font-size:12px;margin-bottom:6px}

    pre{background:#020617;border:1px solid var(--border);padding:10px;border-radius:10px;overflow:auto}

    .line{display:flex;gap:10px}
    .num{color:#64748b;user-select:none;width:30px;text-align:right}
    .code{flex:1;white-space:pre}
  </style>
</head>
<body>

<div class="container">
  <h1>MCFunction Multi-Tool</h1>
  <div class="subtitle">Formatter • Validator • Minifier • Splitter</div>

  <textarea id="inp" placeholder="Paste command or drop .mcfunction here"></textarea>

  <div class="tabs">
    <div class="tab active" data-mode="format">Format</div>
    <div class="tab" data-mode="minify">Minify</div>
    <div class="tab" data-mode="split">Split</div>
    <div class="tab" data-mode="validate">Validate</div>
  </div>

  <div class="controls">
    <button class="primary" onclick="run()">Run</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="copy()">Copy</button>
    <button onclick="downloadFile()">Download</button>
  </div>

  <div id="warn"></div>
  <pre id="out"></pre>
</div>

<script>
let mode = "format";

document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    mode = t.dataset.mode;
    run();
  };
});

function normalize(str){ return str.replace(/\s+/g," ").trim(); }

function validate(str){
  let stack=[];
  for(let i=0;i<str.length;i++){
    let c=str[i];
    if(c==="{"||c==="[") stack.push({c,i});
    if(c==="}"||c==="]"){
      let last=stack.pop();
      if(!last) return `Error at ${i}: unexpected ${c}`;
      if((c==="}" && last.c!=="{") || (c==="]" && last.c!=="["))
        return `Error at ${i}: mismatched ${c}`;
    }
  }
  if(stack.length) return `Error at ${stack[0].i}: unclosed ${stack[0].c}`;
  return "Valid";
}

function format(input){
  let d=0,res=[],cur="",str=false;
  for(let i=0;i<input.length;i++){
    let c=input[i];
    if(c==='"' && input[i-1] !== "\\") str=!str;
    if(!str){
      if("{[".includes(c)){ res.push("  ".repeat(d)+cur.trim()); res.push("  ".repeat(d)+c); d++; cur=""; continue; }
      if("}]".includes(c)){ res.push("  ".repeat(d)+cur.trim()); d--; res.push("  ".repeat(d)+c); cur=""; continue; }
      if(c===","){ cur+=","; res.push("  ".repeat(d)+cur.trim()); cur=""; continue; }
    }
    cur+=c;
  }
  if(cur.trim()) res.push("  ".repeat(d)+cur.trim());
  return res;
}

function minify(str){ return normalize(str); }

function splitCmd(str){ return str.split(" "); }

function render(lines){
  let out="";
  lines.forEach((l,i)=>{
    out+=`<div class="line"><span class="num">${i+1}</span><span class="code">${l}</span></div>`;
  });
  document.getElementById("out").innerHTML = out;
}

function run(){
  let input=document.getElementById("inp").value;
  let warn=document.getElementById("warn");

  if(mode==="validate"){
    let v = validate(input);
    warn.textContent = v === "Valid" ? "✔ Valid structure" : v;
    document.getElementById("out").innerHTML="";
    return;
  }

  let v = validate(input);
  warn.textContent = v === "Valid" ? "" : v;

  if(mode==="format") render(format(normalize(input)));
  if(mode==="minify") render([minify(input)]);
  if(mode==="split") render(splitCmd(input));
}

function copy(){
  let text=[...document.querySelectorAll(".code")].map(e=>e.textContent).join("\n");
  navigator.clipboard.writeText(text);
}

function downloadFile(){
  let text=document.getElementById("out").innerText;
  let blob=new Blob([text],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="output.mcfunction";
  a.click();
}

function clearAll(){
  document.getElementById("inp").value="";
  document.getElementById("out").innerHTML="";
  document.getElementById("warn").textContent="";
}

document.getElementById("inp").addEventListener("dragover",e=>e.preventDefault());
document.getElementById("inp").addEventListener("drop",e=>{
  e.preventDefault();
  let file=e.dataTransfer.files[0];
  let reader=new FileReader();
  reader.onload=()=>{ document.getElementById("inp").value=reader.result; run(); };
  reader.readAsText(file);
});
</script>

</body>
</html>
